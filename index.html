            // --- AUDIO SYSTEM (Web Audio API) ---
        let audioCtx;
function initAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playClick() {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    // Square waves create that retro 8-bit sound
    osc.type = 'square'; 
    
    // A quick pitch jump gives it a quirky "bloop" effect
    osc.frequency.setValueAtTime(440, audioCtx.currentTime);
    osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.04); 
    
    gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
    gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.12);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.12);
}

function playTick() {
    initAudio();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    // A very high, incredibly short blip
    osc.type = 'square';
    osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
    
    gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.03);
    
    osc.start();
    osc.stop(audioCtx.currentTime + 0.03);
}

function playWin() {
    initAudio();
    // Added a high G6 at the end for a victorious Gacha sound
    const notes = [523.25, 659.25, 783.99, 1046.50, 1567.98]; 
    
    notes.forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        osc.type = 'square'; 
        
        // Speeding up the time between notes (0.06 instead of 0.1)
        const startTime = audioCtx.currentTime + (i * 0.06);
        osc.frequency.setValueAtTime(freq, startTime);
        
        gain.gain.setValueAtTime(0.06, startTime);
        gain.gain.linearRampToValueAtTime(0, startTime + 0.15);
        
        osc.start(startTime);
        osc.stop(startTime + 0.15);
    });
}

function pickRandom(arr, count) {
    let shuffled = [...arr].sort(() => 0.5 - Math.random());
    return shuffled.slice(0, count);
}

            // --- WHEEL LOGIC CLASS ---
           class SpinnerWheel {
                // 👉 1. Constructor now takes a masterList and a maxItems limit (defaults to 25)
                constructor(canvasId, masterList, maxItems = 25) {
                    this.canvas = document.getElementById(canvasId);
                    this.ctx = this.canvas.getContext('2d');
                    this.masterList = masterList;
                    this.maxItems = maxItems;
                    
                    // Pick the initial small batch for the screen
                    this.items = pickRandom(this.masterList, this.maxItems);
                    
                    this.currentAngle = 0;
                    this.isSpinning = false;
                    this.draw();
                }

            updateItems(newMasterList) {
                    this.masterList = newMasterList;
                    this.items = pickRandom(this.masterList, this.maxItems);
                    this.currentAngle = 0;
                    this.draw();
                }
                


    // 👉 2. Replace your current draw() with this one:
    draw() {
        const cx = this.canvas.width / 2;
        const cy = this.canvas.height / 2;
        const radius = cx - 10;
        const sliceAngle = (Math.PI * 2) / this.items.length;

        this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
        
        for (let i = 0; i < this.items.length; i++) {
            this.ctx.save();
            this.ctx.translate(cx, cy);
            this.ctx.rotate(this.currentAngle + (i * sliceAngle));

            // Draw Slice
            this.ctx.beginPath();
            this.ctx.moveTo(0, 0);
            this.ctx.arc(0, 0, radius, 0, sliceAngle);
            
            // Generate a color once per slice
            if (!this.sliceColors) this.sliceColors = [];
            if (!this.sliceColors[i]) this.sliceColors[i] = getRandomColor();
            
            this.ctx.fillStyle = this.sliceColors[i];
            this.ctx.fill();
            this.ctx.lineWidth = 1; // Super thin lines for high counts
            this.ctx.strokeStyle = "#000";
            this.ctx.stroke();

            // Draw Text (Only if slice is big enough to read)
            if (this.items.length < 60) {
                this.ctx.rotate(sliceAngle / 2);
                this.ctx.textAlign = "right";
                
                // Get the custom font or default pixel font
                const currentFont = getFont(this.items[i]);
                this.ctx.font = `bold 18px ${currentFont}`; 
                
                this.ctx.fillStyle = "#fff";     // White text
                this.ctx.strokeStyle = "#000";   // Black outline
                this.ctx.lineWidth = 3;          // Outline thickness
                
                // Draw outline first, then fill text over it
                this.ctx.strokeText(this.items[i], radius - 30, 6);
                this.ctx.fillText(this.items[i], radius - 30, 6);
            }
            this.ctx.restore();
        }
    }


spin(callback) {
    if (this.isSpinning) return;

    // Fallback: If masterList is missing for some reason, don't crash
    if (this.masterList) {
        this.items = pickRandom(this.masterList, this.maxItems);
    }
    
    this.draw(); 
    this.isSpinning = true;
    playClick();

    const spinTime = 4000 + Math.random() * 1000;
    const spinAmount = Math.PI * 14 + Math.random() * Math.PI * 4;
    const startTime = performance.now();
    const startAngle = this.currentAngle;
    let lastTickAngle = startAngle;
    
    // IMPORTANT: Define this here so animate() can see it
    const sliceAngle = (Math.PI * 2) / this.items.length;

    const animate = (time) => {
        let progress = (time - startTime) / spinTime;
        if (progress > 1) progress = 1;
        
        const easeProgress = 1 - Math.pow(1 - progress, 3);
        this.currentAngle = startAngle + spinAmount * easeProgress;
        
        if (Math.floor(this.currentAngle / sliceAngle) > Math.floor(lastTickAngle / sliceAngle)) {
            playTick();
            lastTickAngle = this.currentAngle;
        }

        this.draw();

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            this.isSpinning = false;
            const offsetAngle = (Math.PI * 1.5 - this.currentAngle) % (Math.PI * 2);
            const normalizedAngle = offsetAngle < 0 ? offsetAngle + Math.PI * 2 : offsetAngle;
            const winningIndex = Math.floor(normalizedAngle / sliceAngle);
            setTimeout(() => callback(this.items[winningIndex]), 200);
        }
    };
    requestAnimationFrame(animate);
}

           }
            

            // --- INITIALIZE WHEELS ---
            const charWheel = new SpinnerWheel('charWheel', characters, 40);
            const perkWheel = new SpinnerWheel('perkWheel', currentPerkList, 30);
            const envWheel = new SpinnerWheel('envWheel', environments, 30);

            // --- BUTTON ACTIONS ---
            document.getElementById('spinCharBtn').addEventListener('click', () => {
                charWheel.spin((winner) => {
                    showModal("CHARACTER", winner);
                    for (let i = 0; i < players.length; i++) {
                        if (playerStats[i].char === "") {
                            playerStats[i].char = winner;
                            renderPlayers();
                            break;
                        }
                    }
                });
            });

            document.getElementById('spinPerkBtn').addEventListener('click', () => {
                perkWheel.spin((winner) => {
                    showModal("PERK", winner);
                    for (let i = 0; i < players.length; i++) {
                        if (playerStats[i].perk === "") {
                            playerStats[i].perk = winner;
                            renderPlayers();
                            break;
                        }
                    }
                });
            });

            document.getElementById('spinEnvBtn').addEventListener('click', () => {
                envWheel.spin((winner) => {
                    showModal("ENVIRONMENT", winner);
                    currentEnvironment = winner;
                    document.getElementById('envOutput').innerText = `Environment: ${winner}`;
                });
            });

            function setSpecificPerks() {
                const searchInput = document.getElementById('perkSearch').value.toLowerCase().trim();
                if (specificPerks[searchInput]) {
                    currentPerkList = specificPerks[searchInput];
                    perkWheel.updateItems(currentPerkList);
                } else {
                    alert("Character not found! Using current list.");
                }
            }

            function resetGenericPerks() {
                document.getElementById('perkSearch').value = "";
                currentPerkList = [...genericPerks];
                perkWheel.updateItems(currentPerkList);
            }

            function generateAIPrompt() {
                let promptText = "Between ";
                for (let i = 0; i < players.length; i++) {
                    let char = playerStats[i].char || "No Character";
                    let perk = playerStats[i].perk || "No Perk";
                    promptText += `( ${players[i]} ${char}, with ( ${perk} ) )`;
                    if (i < players.length - 1) promptText += ",\n";
                }
                promptText += `\nIn <${currentEnvironment}>`;
                document.getElementById('aiPromptOutput').value = promptText;
            }

            renderPlayers();

            
        </script>
