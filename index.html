<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mega Game Battle Wheel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
    
<link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="wheel-section">
        <h2 class="pixel-font">Character Wheel</h2>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="charWheel"></canvas>
            <button class="center-spin-btn" id="spinCharBtn">SPIN</button>
        </div>
    </div>

    <div class="players-wrapper" id="players-wrapper"></div>

    <div class="wheel-section">
        <h2 class="pixel-font">Perk Wheel</h2>
        <div class="search-box">
            <input type="text" id="perkSearch" placeholder="Search specific char...">
            <button class="pixel-font pixel-btn" onclick="playClick(); setSpecificPerks();">Set</button>
            <button class="pixel-font pixel-btn" onclick="playClick(); resetGenericPerks();" style="background-color: #6a5acd;">Base</button>
        </div>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="perkWheel"></canvas>
            <button class="center-spin-btn" id="spinPerkBtn">SPIN</button>
        </div>
    </div>

    <div class="wheel-section">
        <h2 class="pixel-font">Environment Wheel</h2>
        <div class="wheel-container">
            <div class="pointer"></div>
            <canvas id="envWheel"></canvas>
            <button class="center-spin-btn" id="spinEnvBtn">SPIN</button>
        </div>
        
        <div class="pixel-box" style="margin-top: 30px; font-size: 2rem; width: 80%; max-width: 600px; display: flex; align-items: center; justify-content: center; gap: 15px;" id="envOutput">
            Environment: <span id="envText">?</span>
        </div>
    </div>

    <div class="output-section">
        <button class="pixel-font pixel-btn" onclick="playClick(); generateAIPrompt();" style="width: 100%; max-width: 800px;">Generate AI Prompt</button>
        <textarea class="pixel-box" id="aiPromptOutput" readonly placeholder="Your AI prompt will appear here..."></textarea>
    </div>

    <div class="modal-overlay" id="resultModal">
        <div class="epic-modal-content" id="epicModal">
            <h3 id="modalType">Winner!</h3>
            <div id="modalResult">???</div>
            <button class="pixel-font pixel-btn" onclick="playClick(); closeModal();" style="margin-top: 20px;">CONTINUE</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>

</body>
</html>
